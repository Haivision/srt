name: Linux C++11

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]
    types: [opened, synchronize, reopened]
jobs:
  build:
    strategy:
        matrix:
            machine: [ubuntu-latest, ubuntu-slim, ubuntu-24.04-arm]
    name: ON ${{ matrix.machine }}
    runs-on: "${{ matrix.machine }}"
    steps:
    - uses: actions/checkout@v3
    - name: prepare
      run: |
        RUNON=${{ matrix.machine }}
        MAYBE_GDB=$( [[ $RUNON == ubuntu-latest ]] && echo gdb )
        sudo apt install -y tcl cmake libssl-dev $MAYBE_GDB
    - name: configure
      run: |
        mkdir _build && cd _build
        cmake ../ -DCMAKE_COMPILE_WARNING_AS_ERROR=ON -DUSE_CXX_STD=11 -DENABLE_STDCXX_SYNC=ON -DENABLE_ENCRYPTION=ON -DENABLE_UNITTESTS=ON -DENABLE_BONDING=ON -DENABLE_TESTING=ON -DENABLE_EXAMPLES=ON -DENABLE_CODE_COVERAGE=ON -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
    - name: build
      run: cd _build && cmake --build .
    - name: test
      run: |
        echo "core.%e" | sudo tee /proc/sys/kernel/core_pattern
        ulimit -c unlimited
        cd _build && ctest --extra-verbose
        SUCCESS=$?
        if [ -f core.test-srt ]; then gdb -batch ./test-srt -c core -ex bt -ex "info thread" -ex quit; else echo "NO CORE - NO CRY!"; fi;
        test $SUCCESS == 0;
    - name: codecov
      run: |
        source ./scripts/collect-gcov.sh
        bash <(curl -s https://codecov.io/bash)
